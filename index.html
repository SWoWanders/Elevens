<!-- Catches any script error (load failure or runtime) and prints it directly
     on screen. Mobile browsers make devtools awkward to reach, so this turns
     a silent blank page into a readable message instead. -->
<script>
  function showBootError(msg) {
    var el = document.getElementById('boot-error');
    if (!el) {
      el = document.createElement('pre');
      el.id = 'boot-error';
      el.style.cssText = 'position:fixed;inset:0;margin:0;background:#1a0000;color:#ff9d9d;padding:16px;font:12px/1.5 monospace;white-space:pre-wrap;z-index:99999;overflow:auto;';
      document.addEventListener('DOMContentLoaded', function () { document.body.appendChild(el); });
    }
    el.textContent += msg + '\n';
  }
  window.addEventListener('error', function (e) {
    showBootError('Error: ' + e.message + (e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showBootError('Unhandled promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>

<style>
  :root{

    --felt:#10241c;

  .marquee{

  /* ================= RESPONSIVE BOARD BLUEPRINT ================= */

  .card.selected{ transform:translateY(-10px) scale(1.05); box-shadow:0 6px 18px rgba(0,0,0,0.5); }
  .card.playable-glow{ box-shadow:0 0 0 3px #fff8, 0 0 14px 2px currentColor; }

  .thinking-dots span{ animation:blink 1.2s infinite; }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ============================================================
// SOUND ENGINE — synthesized Web Audio SFX, no external assets
// ============================================================
const Sound = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone({ freq, duration, type = "square", startTime = 0, gain = 0.15, glideTo = null }) {
    const c = ac();
    const osc = c.createOscillator();
    const gainNode = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + startTime);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, c.currentTime + startTime + duration);
    gainNode.gain.setValueAtTime(gain, c.currentTime + startTime);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + startTime + duration);
    osc.connect(gainNode).connect(c.destination);
    osc.start(c.currentTime + startTime);
    osc.stop(c.currentTime + startTime + duration + 0.02);
  }
  return {
    place() {
      tone({ freq: 520, duration: 0.09, type: "square", gain: 0.18 });
      tone({ freq: 780, duration: 0.06, type: "square", startTime: 0.05, gain: 0.12 });
    },
    pass() { tone({ freq: 300, duration: 0.1, type: "triangle", gain: 0.1 }); },
    error() {
      tone({ freq: 160, duration: 0.16, type: "square", gain: 0.16 });
      tone({ freq: 110, duration: 0.22, type: "square", startTime: 0.1, gain: 0.16 });
    },
    yourTurn() {
      tone({ freq: 660, duration: 0.1, type: "sine", gain: 0.15 });
      tone({ freq: 880, duration: 0.12, type: "sine", startTime: 0.11, gain: 0.15 });
    },
    victory() {
      [523, 659, 784, 1046].forEach((f, i) => tone({ freq: f, duration: 0.22, type: "square", startTime: i * 0.14, gain: 0.16 }));
    },
  };
})();

// ============================================================
// GAME ENGINE — pure functions, matching authentic "Elfer raus!" rules:
//  - 80 cards, 4 colors, 1-20 each
//  - Entire deck dealt evenly; leftover cards set aside face-down, UNUSED
//    (there is no draw pile in the real game)
//  - Whoever holds the red 11 opens the game by placing it in the middle;
//    if nobody has it (it landed in the leftover pile), fall back to
//    yellow, then green, then blue; if no 11 was dealt at all, redeal
//  - On your turn you may play as many legal cards as you want (including
//    zero), one at a time, and may voluntarily stop even with legal plays
//    remaining — that tactical withholding is core to the real game
// ============================================================
const COLORS = ["red", "yellow", "green", "blue"];
const COLOR_LABEL = { red: "Red", yellow: "Yellow", green: "Green", blue: "Blue" };
const STARTING_COLOR_PRIORITY = ["red", "yellow", "green", "blue"];

function createDeck() {
  const deck = [];
  for (const color of COLORS) for (let value = 1; value <= 20; value++) deck.push({ color, value });
  return deck;
}
function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/** Deal the full 80-card deck evenly; remainder is set aside, unused, for the round. */
function dealCards(playerCount) {
  const deck = shuffle(createDeck());
  const perPlayer = Math.floor(deck.length / playerCount);
  const hands = [];
  let cursor = 0;
  for (let i = 0; i < playerCount; i++) {
    hands.push(deck.slice(cursor, cursor + perPlayer));
    cursor += perPlayer;
  }
  return { hands, leftoverCount: deck.length - cursor };
}

/** Find who holds the red 11 (or the next color in priority order). Null if nobody dealt any 11. */
function findStartingPlayer(hands) {
  for (const color of STARTING_COLOR_PRIORITY) {
    const idx = hands.findIndex((hand) => hand.some((c) => c.color === color && c.value === 11));
    if (idx !== -1) {
      const card = hands[idx].find((c) => c.color === color && c.value === 11);
      return { playerIndex: idx, card };
    }
  }
  return null;
}

function createBoard() {
  const board = {};
  for (const color of COLORS) board[color] = { opened: false, min: 11, max: 11 };
  return board;
}
function isValidMove(board, card) {
  const row = board[card.color];
  if (!row) return false;
  if (!row.opened) return card.value === 11;
  return card.value === row.min - 1 || card.value === row.max + 1;
}
function hasAnyValidMove(board, hand) { return hand.some((c) => isValidMove(board, c)); }
function applyMove(board, card) {
  const newBoard = JSON.parse(JSON.stringify(board));
  const row = newBoard[card.color];
  if (!row.opened) { row.opened = true; row.min = 11; row.max = 11; }
  else if (card.value === row.min - 1) row.min = card.value;
  else if (card.value === row.max + 1) row.max = card.value;
  return newBoard;
}
function calculatePenalty(hand) { return hand.reduce((s, c) => s + c.value, 0); }
function removeCard(hand, card) {
  const idx = hand.findIndex((c) => c.color === card.color && c.value === card.value);
  if (idx === -1) return { hand, removed: null };
  return { hand: [...hand.slice(0, idx), ...hand.slice(idx + 1)], removed: hand[idx] };
}

// ---- Bot heuristic: pick the single best legal card from a hand ----
// Prefers (1) opening a brand-new row, then (2) cards that set up more of
// its own follow-up cards to become playable, with light randomness so
// bots don't feel identical to each other.
function chooseBestCard(board, hand, legal) {
  function chainDepth(card, boardAfter) {
    let depth = 0, b = boardAfter;
    let pool = hand.filter((c) => !(c.color === card.color && c.value === card.value));
    let progressed = true;
    while (progressed) {
      progressed = false;
      for (const c of pool) {
        if (isValidMove(b, c)) { depth++; b = applyMove(b, c); pool = pool.filter((x) => x !== c); progressed = true; break; }
      }
    }
    return depth;
  }
  const scored = legal.map((card) => {
    const opensRow = !board[card.color].opened;
    const depth = chainDepth(card, applyMove(board, card));
    return { card, score: (opensRow ? 5 : 0) + depth + Math.random() * 0.5 };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored[0].card;
}

// Plan an entire bot turn up front (deterministic given board/hand, aside
// from its own randomized "keep going or hold back" coin flips), so the UI
// can just animate through the list with delays afterward.
function planBotTurn(board, hand) {
  const plan = [];
  let workingBoard = board;
  let workingHand = [...hand];
  while (true) {
    const legal = workingHand.filter((c) => isValidMove(workingBoard, c));
    if (legal.length === 0) break;
    const card = chooseBestCard(workingBoard, workingHand, legal);
    plan.push(card);
    workingBoard = applyMove(workingBoard, card);
    workingHand = workingHand.filter((c) => !(c.color === card.color && c.value === card.value));
    if (workingHand.length === 0) break; // always finish the round if this card wins it
    const stillLegal = workingHand.some((c) => isValidMove(workingBoard, c));
    if (!stillLegal) break;
    // Strategic withholding: real players often stop even with legal plays
    // left, to avoid opening opportunities for opponents. ~25% chance per step.
    if (Math.random() > 0.75) break;
  }
  return plan;
}

// ============================================================
// UI COMPONENTS
// ============================================================
function Card({ card, selected, playable, disabled, onClick }) {
  const cls = ["card", `card-${card.color}`, selected ? "selected" : "", playable ? "playable-glow" : "", disabled ? "disabled" : ""].join(" ");
  return (
    <div className={cls} style={{ color: `var(--${card.color})` }} onClick={disabled ? undefined : onClick}>
      <span className="font-num" style={{ color: "inherit", filter: "brightness(0.3)" }}>{card.value}</span>
    </div>
  );
}

function BoardRow({ color, row, dragOver, onDragOver, onDragLeave, onDrop, onRowTap }) {
  const glowVar = { "--row-glow": `var(--${color})` };
  const sequence = [];
  if (row.opened) for (let v = row.min; v <= row.max; v++) sequence.push(v);
  return (
    <div
      className={`board-row ${dragOver ? "drop-active" : ""}`}
      style={glowVar}
      onDragOver={(e) => { e.preventDefault(); onDragOver && onDragOver(); }}
      onDragLeave={onDragLeave}
      onDrop={onDrop}
      onClick={onRowTap}
    >
      <div className="flex items-center justify-between mb-1 px-1">
        <span className="font-display text-xs" style={{ color: `var(--${color})` }}>{COLOR_LABEL[color]}</span>
        <span className="text-[10px] opacity-60 font-num">{row.opened ? `${row.min}–${row.max}` : "closed"}</span>
      </div>
      <div className="anchor-slot">
        {row.opened ? sequence.map((v) => (
          <div key={v} className="card" style={{
            width: "36px", height: "50px", fontSize: "0.85rem",
            background: `var(--${color})`, opacity: v === 11 ? 1 : 0.85,
            boxShadow: (v === row.min || v === row.max) ? "0 0 8px 1px currentColor" : "none",
            color: `var(--${color})`,
          }}>
            <span className="font-num" style={{ color: "inherit", filter: "brightness(0.25)" }}>{v}</span>
          </div>
        )) : <div className="card-back" title="Play the 11 to open this row" />}
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [screen, setScreen] = useState("setup"); // setup | playing | roundOver | matchOver
  const [opponentCount, setOpponentCount] = useState(2);
  const [roundsToPlay, setRoundsToPlay] = useState(3);
  const [roundNumber, setRoundNumber] = useState(1);
  const [players, setPlayers] = useState([]); // [{name, isBot}]
  const [hands, setHands] = useState([]); // hands[playerIndex] = [card,...]
  const [board, setBoard] = useState(createBoard());
  const [leftoverCount, setLeftoverCount] = useState(0);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [lastAction, setLastAction] = useState(null);
  const [roundWinnerIndex, setRoundWinnerIndex] = useState(null);
  const [roundScores, setRoundScores] = useState({});
  const [cumulativeScores, setCumulativeScores] = useState({});
  const [selectedCard, setSelectedCard] = useState(null);
  const [dragOverColor, setDragOverColor] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [activeTabIndex, setActiveTabIndex] = useState(0);
  const [botThinking, setBotThinking] = useState(false);
  const prevTurnRef = useRef(null);
  const botTimeoutRef = useRef(null);

  const isMyTurn = screen === "playing" && currentIndex === 0;

  const showError = (msg) => {
    setErrorMsg(msg);
    Sound.error();
    setTimeout(() => setErrorMsg(""), 1800);
  };

  // ---- deal a round and determine/apply the forced red-11 opening ----
  const dealRoundAndBegin = (playerList) => {
    let dealt, leftover, starter;
    do {
      const result = dealCards(playerList.length);
      dealt = result.hands;
      leftover = result.leftoverCount;
      starter = findStartingPlayer(dealt);
    } while (!starter); // reshuffle & redeal if no 11 was dealt to anyone at all

    const openedBoard = applyMove(createBoard(), starter.card);
    const { hand: startingHand } = removeCard(dealt[starter.playerIndex], starter.card);
    dealt[starter.playerIndex] = startingHand;

    setHands(dealt);
    setBoard(openedBoard);
    setLeftoverCount(leftover);
    setCurrentIndex(starter.playerIndex);
    setLastAction({ type: "open", playerIndex: starter.playerIndex, card: starter.card });
    setRoundWinnerIndex(null);
    setRoundScores({});
    setSelectedCard(null);
    prevTurnRef.current = null;
    setScreen("playing");
    Sound.place();
  };

  const startMatch = () => {
    const total = opponentCount + 1;
    const newPlayers = [{ name: "You", isBot: false }];
    for (let i = 1; i < total; i++) newPlayers.push({ name: `CPU ${i}`, isBot: true });
    setPlayers(newPlayers);
    setRoundNumber(1);
    setCumulativeScores(Object.fromEntries(newPlayers.map((_, i) => [i, 0])));
    dealRoundAndBegin(newPlayers);
  };

  const nextRound = () => {
    setRoundNumber((n) => n + 1);
    dealRoundAndBegin(players);
  };

  const newMatch = () => setScreen("setup");

  // ---- turn advancement ----
  const advanceTurn = (fromIndex) => (fromIndex + 1) % players.length;

  const checkRoundEnd = (handsSnapshot) => {
    const idx = handsSnapshot.findIndex((h) => h.length === 0);
    if (idx === -1) return false;
    const roundPoints = {};
    handsSnapshot.forEach((h, i) => { roundPoints[i] = calculatePenalty(h); });
    setRoundScores(roundPoints);
    setCumulativeScores((prev) => {
      const next = { ...prev };
      handsSnapshot.forEach((h, i) => { next[i] = (next[i] || 0) + roundPoints[i]; });
      return next;
    });
    setRoundWinnerIndex(idx);
    setScreen(roundNumber >= roundsToPlay ? "matchOver" : "roundOver");
    return true;
  };

  // ---- human plays a card (turn stays active — you may play more, or End Turn) ----
  const playCard = useCallback((card) => {
    if (!isMyTurn) { Sound.error(); return; }
    if (!isValidMove(board, card)) { showError("That card can't go there."); return; }
    const { hand: newHand, removed } = removeCard(hands[0], card);
    if (!removed) return;

    const newBoard = applyMove(board, card);
    const newHands = [...hands];
    newHands[0] = newHand;

    setBoard(newBoard);
    setHands(newHands);
    setSelectedCard(null);
    setLastAction({ type: "play", playerIndex: 0, card });
    Sound.place();

    checkRoundEnd(newHands); // if this emptied the hand, the round ends; otherwise turn stays with you
  }, [board, hands, isMyTurn, roundNumber, roundsToPlay]);

  const handleCardTap = (card) => {
    if (!isMyTurn) { Sound.error(); return; }
    if (selectedCard && selectedCard.color === card.color && selectedCard.value === card.value) { setSelectedCard(null); return; }
    setSelectedCard(card);
  };
  const handleRowTap = (color) => {
    if (!selectedCard) return;
    if (selectedCard.color !== color) { Sound.error(); return; }
    playCard(selectedCard);
  };
  const handleDrop = (color) => (e) => {
    e.preventDefault();
    setDragOverColor(null);
    const data = e.dataTransfer.getData("text/plain");
    if (!data) return;
    const card = JSON.parse(data);
    if (card.color !== color) { Sound.error(); return; }
    playCard(card);
  };

  const humanCanPlayAnything = hands[0] ? hasAnyValidMove(board, hands[0]) : false;

  // Ending your turn is always available — you may pass even with legal
  // plays remaining, which is real tactical withholding in Elfer raus.
  const handleEndTurn = () => {
    if (!isMyTurn) return;
    setLastAction({ type: "pass", playerIndex: 0 });
    Sound.pass();
    setCurrentIndex(advanceTurn(0));
  };

  // ---- bot turn: plan the whole turn, then animate through it ----
  useEffect(() => {
    if (screen !== "playing") return;
    const player = players[currentIndex];
    if (!player || !player.isBot) return;

    setBotThinking(true);
    const startingHand = hands[currentIndex];
    const plan = planBotTurn(board, startingHand);

    let step = 0;
    let workingBoard = board;
    let workingHands = hands;

    function playNext() {
      if (step < plan.length) {
        const card = plan[step];
        const { hand: newHand } = removeCard(workingHands[currentIndex], card);
        workingBoard = applyMove(workingBoard, card);
        workingHands = [...workingHands];
        workingHands[currentIndex] = newHand;
        setBoard(workingBoard);
        setHands(workingHands);
        setLastAction({ type: "play", playerIndex: currentIndex, card });
        Sound.place();
        step++;
        if (checkRoundEnd(workingHands)) { setBotThinking(false); return; }
        botTimeoutRef.current = setTimeout(playNext, 550);
      } else {
        setBotThinking(false);
        setLastAction({ type: "pass", playerIndex: currentIndex });
        setCurrentIndex(advanceTurn(currentIndex));
      }
    }
    botTimeoutRef.current = setTimeout(playNext, 850);
    return () => clearTimeout(botTimeoutRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [currentIndex, screen]);

  // ---- turn-change SFX ----
  useEffect(() => {
    if (screen !== "playing") return;
    const myTurnNow = currentIndex === 0;
    if (myTurnNow && prevTurnRef.current !== true) Sound.yourTurn();
    prevTurnRef.current = myTurnNow;
  }, [currentIndex, screen]);

  useEffect(() => {
    if (screen === "roundOver" || screen === "matchOver") Sound.victory();
  }, [screen]);

  // ---------------- SETUP SCREEN ----------------
  if (screen === "setup") {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-6 px-4">
        <div className="marquee px-8 py-4 text-center">
          <h1 className="font-display text-2xl md:text-3xl" style={{ color: "var(--brass)" }}>ELFER RAUS!</h1>
          <p className="text-xs opacity-70 mt-1">solo vs computer</p>
        </div>
        <div className="w-full max-w-xs flex flex-col gap-4">
          <div>
            <p className="text-xs opacity-60 mb-2">Number of CPU opponents</p>
            <div className="flex gap-2">
              {[1, 2, 3].map((n) => (
                <button key={n} className={`opt-btn flex-1 ${opponentCount === n ? "active" : ""}`} onClick={() => setOpponentCount(n)}>{n}</button>
              ))}
            </div>
          </div>
          <div>
            <p className="text-xs opacity-60 mb-2">Rounds to play</p>
            <div className="flex gap-2">
              {[1, 3, 5].map((n) => (
                <button key={n} className={`opt-btn flex-1 ${roundsToPlay === n ? "active" : ""}`} onClick={() => setRoundsToPlay(n)}>{n}</button>
              ))}
            </div>
          </div>
          <button className="btn" onClick={startMatch}>Start Match</button>
        </div>
      </div>
    );
  }

  // ---------------- ROUND OVER (more rounds remain) ----------------
  if (screen === "roundOver") {
    const winner = players[roundWinnerIndex];
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-6 px-4">
        <div className="marquee px-8 py-4 text-center">
          <p className="text-xs opacity-70">round {roundNumber} of {roundsToPlay} complete</p>
          <h1 className="font-display text-xl" style={{ color: "var(--brass)" }}>
            {roundWinnerIndex === 0 ? "You win the round!" : `${winner?.name} wins the round!`}
          </h1>
        </div>
        <div className="w-full max-w-xs">
          <p className="text-xs opacity-60 mb-2">Round points added / running total</p>
          <ul className="flex flex-col gap-2">
            {players.map((p, i) => (
              <li key={i} className="board-row" style={{ minHeight: "auto", flexDirection: "row", alignItems: "center", justifyContent: "space-between" }}>
                <span>{i === 0 ? "You" : p.name}</span>
                <span className="font-num">+{roundScores[i] ?? 0} &nbsp;→&nbsp; {cumulativeScores[i] ?? 0}</span>
              </li>
            ))}
          </ul>
        </div>
        <button className="btn" onClick={nextRound}>Next Round</button>
      </div>
    );
  }

  // ---------------- MATCH OVER (final round complete) ----------------
  if (screen === "matchOver") {
    const standings = players.map((p, i) => ({ i, name: i === 0 ? "You" : p.name, total: cumulativeScores[i] ?? 0 }))
      .sort((a, b) => a.total - b.total);
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-6 px-4">
        <div className="marquee px-8 py-4 text-center">
          <p className="text-xs opacity-70">match complete — {roundsToPlay} round{roundsToPlay > 1 ? "s" : ""}</p>
          <h1 className="font-display text-xl" style={{ color: "var(--brass)" }}>
            {standings[0].i === 0 ? "You win the match!" : `${standings[0].name} wins the match!`}
          </h1>
        </div>
        <div className="w-full max-w-xs">
          <p className="text-xs opacity-60 mb-2">Final standings (lowest total wins)</p>
          <ul className="flex flex-col gap-2">
            {standings.map((s, rank) => (
              <li key={s.i} className="board-row" style={{ minHeight: "auto", flexDirection: "row", alignItems: "center", justifyContent: "space-between" }}>
                <span>{rank + 1}. {s.name}</span>
                <span className="font-num">{s.total}</span>
              </li>
            ))}
          </ul>
        </div>
        <button className="btn" onClick={newMatch}>New Match</button>
      </div>
    );
  }

  // ---------------- ACTIVE GAME ----------------
  const currentPlayer = players[currentIndex];
  const myHand = hands[0] || [];

  return (
    <div className="h-screen flex flex-col">
      <div className={`flex items-center justify-between px-3 py-2 marquee mx-2 mt-2 rounded ${isMyTurn ? "turn-pulse" : ""}`}>
        <span className="font-display text-xs" style={{ color: "var(--brass)" }}>ROUND {roundNumber}/{roundsToPlay}</span>
        <span className="text-sm">
          {isMyTurn ? <b style={{ color: "var(--brass)" }}>Your turn</b> : (
            <span>{currentPlayer?.name}'s turn{botThinking && <span className="thinking-dots ml-1"><span>.</span><span>.</span><span>.</span></span>}</span>
          )}
        </span>
        <span className="text-xs opacity-60 font-num" title="Cards set aside unused this round">{leftoverCount} aside</span>
      </div>

      {errorMsg && (
        <div className="mx-2 mt-2 text-xs px-3 py-1.5 rounded text-center" style={{ background: "var(--red)", color: "#3a0006" }}>{errorMsg}</div>
      )}

      <div className="row-tabs mt-2">
        {COLORS.map((c, i) => (
          <div key={c} className={`row-dot ${i === activeTabIndex ? "active" : ""}`} style={i === activeTabIndex ? { background: `var(--${c})` } : {}} onClick={() => setActiveTabIndex(i)} />
        ))}
      </div>
      <div className="board-wrap flex-1 min-h-0">
        {COLORS.map((color) => (
          <BoardRow
            key={color}
            color={color}
            row={board[color]}
            dragOver={dragOverColor === color}
            onDragOver={() => setDragOverColor(color)}
            onDragLeave={() => setDragOverColor(null)}
            onDrop={handleDrop(color)}
            onRowTap={() => handleRowTap(color)}
          />
        ))}
      </div>

      <div className="flex gap-2 px-3 overflow-x-auto text-[11px] opacity-70 pb-1">
        {players.map((p, i) => (
          <span key={i} className={i === currentIndex ? "font-bold" : ""} style={i === currentIndex ? { color: "var(--brass)" } : {}}>
            {i === 0 ? "You" : p.name} ({(hands[i] || []).length})
          </span>
        ))}
      </div>

      <div className="flex gap-2 justify-center px-3 pb-2">
        <button className="btn btn-ghost text-xs" disabled={!isMyTurn} onClick={handleEndTurn}>
          {humanCanPlayAnything ? "End Turn (hold back cards)" : "Pass (no valid moves)"}
        </button>
      </div>

      <div className="hand-strip border-t" style={{ borderColor: "var(--felt-line)" }}>
        {myHand.map((card, i) => {
          const playable = isValidMove(board, card);
          const isSelected = selectedCard && selectedCard.color === card.color && selectedCard.value === card.value;
          return (
            <div key={`${card.color}-${card.value}-${i}`} draggable={isMyTurn} onDragStart={(e) => e.dataTransfer.setData("text/plain", JSON.stringify(card))}>
              <Card card={card} selected={isSelected} playable={isMyTurn && playable} onClick={() => handleCardTap(card)} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (e) {
  if (window.showBootError) window.showBootError("Render error: " + e.message);
  console.error(e);
}
</script>
</body>
</html>
