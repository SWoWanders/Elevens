<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Elfer raus! — Solo vs CPU</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root{
    --bg-void:#0a0d0c;
    --felt:#10241c;
    --felt-line:#1c3a2c;
    --brass:#c9a24b;
    --ivory:#eee7d8;
    --red:#ff4d5e;
    --yellow:#ffcb3d;
    --green:#33d17a;
    --blue:#3fa9f5;
  }
  html,body,#root{height:100%;}
  body{
    margin:0;
    background:radial-gradient(1200px 800px at 50% -10%, #14261d 0%, var(--bg-void) 60%);
    color:var(--ivory);
    font-family:'Space Mono', monospace;
    overscroll-behavior:none;
  }
  .font-display{font-family:'Silkscreen', monospace; letter-spacing:0.5px;}
  .font-num{font-family:'JetBrains Mono', monospace;}

  .marquee{
    border:2px solid var(--brass);
    border-radius:6px;
    background:linear-gradient(180deg,#14241c,#0d1912);
    box-shadow:0 0 18px rgba(201,162,75,0.25), inset 0 0 12px rgba(201,162,75,0.08);
  }

  /* ================= RESPONSIVE BOARD BLUEPRINT ================= */
  .board-wrap{ display:grid; gap:0.75rem; padding:0.75rem; }
  @media (orientation: landscape){
    .board-wrap{ grid-template-columns:repeat(4, minmax(0,1fr)); grid-auto-rows:1fr; }
    .row-tabs{ display:none; }
  }
  @media (orientation: portrait){
    .board-wrap{
      grid-template-columns:100%;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
      display:flex;
    }
    .board-wrap > .board-row{ min-width:100%; scroll-snap-align:center; }
  }

  .board-row{
    border:1.5px solid var(--felt-line);
    background:var(--felt);
    border-radius:10px;
    padding:0.6rem;
    display:flex; flex-direction:column;
    min-height:150px;
  }
  .board-row.drop-active{ box-shadow:0 0 0 3px var(--row-glow, var(--brass)) inset; }
  .row-tabs{ display:flex; justify-content:center; gap:0.4rem; padding-bottom:0.25rem; }
  .row-dot{ width:9px;height:9px;border-radius:50%; background:#33403a; transition:background 0.2s; }
  .row-dot.active{ background:var(--brass); }

  .hand-strip{
    display:flex; gap:0.5rem; overflow-x:auto; padding:0.75rem;
    -webkit-overflow-scrolling:touch;
  }
  .hand-strip::-webkit-scrollbar{ height:6px; }
  .hand-strip::-webkit-scrollbar-thumb{ background:var(--felt-line); border-radius:3px; }

  .card{
    flex:0 0 auto; width:58px; height:82px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.4rem; font-weight:800; cursor:pointer; user-select:none;
    transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    border:2px solid rgba(0,0,0,0.35);
    position:relative;
  }
  .card.selected{ transform:translateY(-10px) scale(1.05); box-shadow:0 6px 18px rgba(0,0,0,0.5); }
  .card.playable-glow{ box-shadow:0 0 0 3px #fff8, 0 0 14px 2px currentColor; }
  .card.disabled{ opacity:0.45; cursor:not-allowed; }
  .card-red{ background:var(--red); color:#3a0006; }
  .card-yellow{ background:var(--yellow); color:#3a2c00; }
  .card-green{ background:var(--green); color:#00301a; }
  .card-blue{ background:var(--blue); color:#00233a; }
  .card-back{ width:40px;height:56px;border-radius:6px; background:repeating-linear-gradient(45deg,var(--felt-line),var(--felt-line) 4px,var(--felt) 4px,var(--felt) 8px); border:2px solid var(--brass); }

  .anchor-slot{ width:100%; padding:0.5rem 0; display:flex; align-items:center; justify-content:center; gap:0.4rem; flex-wrap:wrap; }

  .turn-pulse{ animation:pulseGlow 1.4s ease-in-out infinite; }
  @keyframes pulseGlow{ 0%,100%{ box-shadow:0 0 0px var(--brass); } 50%{ box-shadow:0 0 16px 2px var(--brass); } }

  .thinking-dots span{ animation:blink 1.2s infinite; }
  .thinking-dots span:nth-child(2){ animation-delay:0.2s; }
  .thinking-dots span:nth-child(3){ animation-delay:0.4s; }
  @keyframes blink{ 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

  .btn{
    font-family:'Silkscreen', monospace; background:var(--brass); color:#241a05;
    border:none; border-radius:6px; padding:0.6rem 1.1rem; cursor:pointer;
    letter-spacing:1px; transition:transform 0.1s ease, filter 0.1s ease;
  }
  .btn:hover{ filter:brightness(1.08); }
  .btn:active{ transform:scale(0.97); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-ghost{ background:transparent; border:2px solid var(--brass); color:var(--brass); }
  .opt-btn{
    border:1.5px solid var(--felt-line); background:var(--felt); color:var(--ivory);
    border-radius:6px; padding:0.5rem 0.8rem; cursor:pointer; font-family:'Space Mono', monospace;
  }
  .opt-btn.active{ border-color:var(--brass); color:var(--brass); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ============================================================
// SOUND ENGINE — synthesized Web Audio SFX, no external assets
// ============================================================
const Sound = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone({ freq, duration, type = "square", startTime = 0, gain = 0.15, glideTo = null }) {
    const c = ac();
    const osc = c.createOscillator();
    const gainNode = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + startTime);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, c.currentTime + startTime + duration);
    gainNode.gain.setValueAtTime(gain, c.currentTime + startTime);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + startTime + duration);
    osc.connect(gainNode).connect(c.destination);
    osc.start(c.currentTime + startTime);
    osc.stop(c.currentTime + startTime + duration + 0.02);
  }
  return {
    place() {
      tone({ freq: 520, duration: 0.09, type: "square", gain: 0.18 });
      tone({ freq: 780, duration: 0.06, type: "square", startTime: 0.05, gain: 0.12 });
    },
    draw() { tone({ freq: 220, duration: 0.18, type: "sawtooth", gain: 0.1, glideTo: 340 }); },
    error() {
      tone({ freq: 160, duration: 0.16, type: "square", gain: 0.16 });
      tone({ freq: 110, duration: 0.22, type: "square", startTime: 0.1, gain: 0.16 });
    },
    yourTurn() {
      tone({ freq: 660, duration: 0.1, type: "sine", gain: 0.15 });
      tone({ freq: 880, duration: 0.12, type: "sine", startTime: 0.11, gain: 0.15 });
    },
    victory() {
      [523, 659, 784, 1046].forEach((f, i) => tone({ freq: f, duration: 0.22, type: "square", startTime: i * 0.14, gain: 0.16 }));
    },
  };
})();

// ============================================================
// GAME ENGINE — pure functions, no framework/network dependency
// ============================================================
const COLORS = ["red", "yellow", "green", "blue"];
const COLOR_LABEL = { red: "Red", yellow: "Yellow", green: "Green", blue: "Blue" };

function createDeck() {
  const deck = [];
  for (const color of COLORS) for (let value = 1; value <= 20; value++) deck.push({ color, value });
  return deck;
}
function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function dealCards(playerCount, cardsPerPlayer = 10) {
  const deck = shuffle(createDeck());
  const hands = [];
  let cursor = 0;
  for (let i = 0; i < playerCount; i++) {
    hands.push(deck.slice(cursor, cursor + cardsPerPlayer));
    cursor += cardsPerPlayer;
  }
  return { hands, drawPile: deck.slice(cursor) };
}
function createBoard() {
  const board = {};
  for (const color of COLORS) board[color] = { opened: false, min: 11, max: 11 };
  return board;
}
function isValidMove(board, card) {
  const row = board[card.color];
  if (!row) return false;
  if (!row.opened) return card.value === 11;
  return card.value === row.min - 1 || card.value === row.max + 1;
}
function hasAnyValidMove(board, hand) { return hand.some((c) => isValidMove(board, c)); }
function applyMove(board, card) {
  const newBoard = JSON.parse(JSON.stringify(board));
  const row = newBoard[card.color];
  if (!row.opened) { row.opened = true; row.min = 11; row.max = 11; }
  else if (card.value === row.min - 1) row.min = card.value;
  else if (card.value === row.max + 1) row.max = card.value;
  return newBoard;
}
function calculatePenalty(hand) { return hand.reduce((s, c) => s + c.value, 0); }
function removeCard(hand, card) {
  const idx = hand.findIndex((c) => c.color === card.color && c.value === card.value);
  if (idx === -1) return { hand, removed: null };
  return { hand: [...hand.slice(0, idx), ...hand.slice(idx + 1)], removed: hand[idx] };
}

// ---- Simple bot heuristic ----
// Among all legal moves, prefer: (1) opening a brand-new row (unlocks future
// plays for everyone, but especially itself), then (2) extending the row
// where it already has the most consecutive follow-up cards queued up in
// hand (so it can potentially chain rows across future turns), tie-broken
// randomly so bots don't feel robotic/predictable.
function chooseBotMove(board, hand) {
  const legal = hand.filter((c) => isValidMove(board, c));
  if (legal.length === 0) return null;

  function chainDepth(card, boardAfter) {
    // how many more of this bot's own cards would become playable next,
    // on the same row, if this card is played (rough lookahead heuristic)
    let depth = 0;
    let b = boardAfter;
    let pool = hand.filter((c) => !(c.color === card.color && c.value === card.value));
    let progressed = true;
    while (progressed) {
      progressed = false;
      for (const c of pool) {
        if (isValidMove(b, c)) {
          depth++;
          b = applyMove(b, c);
          pool = pool.filter((x) => x !== c);
          progressed = true;
          break;
        }
      }
    }
    return depth;
  }

  const scored = legal.map((card) => {
    const opensRow = !board[card.color].opened;
    const after = applyMove(board, card);
    const depth = chainDepth(card, after);
    return { card, score: (opensRow ? 5 : 0) + depth + Math.random() * 0.5 };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored[0].card;
}

// ============================================================
// UI COMPONENTS
// ============================================================
function Card({ card, selected, playable, disabled, onClick, small }) {
  const cls = ["card", `card-${card.color}`, selected ? "selected" : "", playable ? "playable-glow" : "", disabled ? "disabled" : ""].join(" ");
  const style = small ? { width: "44px", height: "62px", fontSize: "1rem" } : {};
  return (
    <div className={cls} style={{ ...style, color: `var(--${card.color})` }} onClick={disabled ? undefined : onClick}>
      <span className="font-num" style={{ color: "inherit", filter: "brightness(0.3)" }}>{card.value}</span>
    </div>
  );
}

function BoardRow({ color, row, dragOver, onDragOver, onDragLeave, onDrop, onRowTap }) {
  const glowVar = { "--row-glow": `var(--${color})` };
  const sequence = [];
  if (row.opened) for (let v = row.min; v <= row.max; v++) sequence.push(v);
  return (
    <div
      className={`board-row ${dragOver ? "drop-active" : ""}`}
      style={glowVar}
      onDragOver={(e) => { e.preventDefault(); onDragOver && onDragOver(); }}
      onDragLeave={onDragLeave}
      onDrop={onDrop}
      onClick={onRowTap}
    >
      <div className="flex items-center justify-between mb-1 px-1">
        <span className="font-display text-xs" style={{ color: `var(--${color})` }}>{COLOR_LABEL[color]}</span>
        <span className="text-[10px] opacity-60 font-num">{row.opened ? `${row.min}–${row.max}` : "closed"}</span>
      </div>
      <div className="anchor-slot">
        {row.opened ? sequence.map((v) => (
          <div key={v} className="card" style={{
            width: "36px", height: "50px", fontSize: "0.85rem",
            background: `var(--${color})`, opacity: v === 11 ? 1 : 0.85,
            boxShadow: (v === row.min || v === row.max) ? "0 0 8px 1px currentColor" : "none",
            color: `var(--${color})`,
          }}>
            <span className="font-num" style={{ color: "inherit", filter: "brightness(0.25)" }}>{v}</span>
          </div>
        )) : <div className="card-back" title="Play the 11 to open this row" />}
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [screen, setScreen] = useState("setup"); // setup | playing | roundOver
  const [opponentCount, setOpponentCount] = useState(2);
  const [players, setPlayers] = useState([]); // [{name, isBot}]
  const [hands, setHands] = useState([]); // hands[playerIndex] = [card,...]
  const [board, setBoard] = useState(createBoard());
  const [drawPile, setDrawPile] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [lastAction, setLastAction] = useState(null);
  const [winnerIndex, setWinnerIndex] = useState(null);
  const [scores, setScores] = useState({});
  const [selectedCard, setSelectedCard] = useState(null);
  const [dragOverColor, setDragOverColor] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [activeTabIndex, setActiveTabIndex] = useState(0);
  const [botThinking, setBotThinking] = useState(false);
  const prevTurnRef = useRef(null);
  const botTimeoutRef = useRef(null);

  const isMyTurn = screen === "playing" && currentIndex === 0;

  const showError = (msg) => {
    setErrorMsg(msg);
    Sound.error();
    setTimeout(() => setErrorMsg(""), 1800);
  };

  // ---- start a new game ----
  const startGame = () => {
    const total = opponentCount + 1;
    const newPlayers = [{ name: "You", isBot: false }];
    for (let i = 1; i < total; i++) newPlayers.push({ name: `CPU ${i}`, isBot: true });
    const { hands: dealt, drawPile: pile } = dealCards(total, 10);
    setPlayers(newPlayers);
    setHands(dealt);
    setDrawPile(pile);
    setBoard(createBoard());
    setCurrentIndex(0);
    setLastAction(null);
    setWinnerIndex(null);
    setScores({});
    setSelectedCard(null);
    prevTurnRef.current = null;
    setScreen("playing");
  };

  const playAgain = () => setScreen("setup");

  // ---- turn advancement helpers ----
  const advanceTurn = (fromIndex) => (fromIndex + 1) % players.length;

  const checkRoundEnd = (handsSnapshot) => {
    const idx = handsSnapshot.findIndex((h) => h.length === 0);
    if (idx !== -1) {
      const finalScores = {};
      handsSnapshot.forEach((h, i) => { finalScores[i] = calculatePenalty(h); });
      setScores(finalScores);
      setWinnerIndex(idx);
      setScreen("roundOver");
      return true;
    }
    return false;
  };

  // ---- human plays a card ----
  const playCard = useCallback((card) => {
    if (!isMyTurn) { Sound.error(); return; }
    if (!isValidMove(board, card)) { showError("That card can't go there."); return; }
    const { hand: newHand, removed } = removeCard(hands[0], card);
    if (!removed) return;

    const newBoard = applyMove(board, card);
    const newHands = [...hands];
    newHands[0] = newHand;

    setBoard(newBoard);
    setHands(newHands);
    setSelectedCard(null);
    setLastAction({ type: "play", playerIndex: 0, card });
    Sound.place();

    if (!checkRoundEnd(newHands)) setCurrentIndex(advanceTurn(0));
  }, [board, hands, isMyTurn, players.length]);

  const handleCardTap = (card) => {
    if (!isMyTurn) { Sound.error(); return; }
    if (selectedCard && selectedCard.color === card.color && selectedCard.value === card.value) { setSelectedCard(null); return; }
    setSelectedCard(card);
  };
  const handleRowTap = (color) => {
    if (!selectedCard) return;
    if (selectedCard.color !== color) { Sound.error(); return; }
    playCard(selectedCard);
  };
  const handleDrop = (color) => (e) => {
    e.preventDefault();
    setDragOverColor(null);
    const data = e.dataTransfer.getData("text/plain");
    if (!data) return;
    const card = JSON.parse(data);
    if (card.color !== color) { Sound.error(); return; }
    playCard(card);
  };

  const humanCanPlayAnything = hands[0] ? hasAnyValidMove(board, hands[0]) : false;

  const handleDraw = () => {
    if (!isMyTurn) return;
    if (humanCanPlayAnything) { showError("You have a valid move — play it before drawing."); return; }
    if (drawPile.length === 0) {
      setLastAction({ type: "pass", playerIndex: 0 });
      setCurrentIndex(advanceTurn(0));
      return;
    }
    const newPile = [...drawPile];
    const drawn = newPile.pop();
    const newHands = [...hands];
    newHands[0] = [...newHands[0], drawn];
    setDrawPile(newPile);
    setHands(newHands);
    setLastAction({ type: "draw", playerIndex: 0, card: drawn });
    Sound.draw();
    if (!isValidMove(board, drawn)) setCurrentIndex(advanceTurn(0));
  };
  const handleEndTurn = () => {
    if (!isMyTurn) return;
    setLastAction({ type: "pass", playerIndex: 0 });
    setCurrentIndex(advanceTurn(0));
  };

  // ---- bot turn orchestration ----
  useEffect(() => {
    if (screen !== "playing") return;
    const player = players[currentIndex];
    if (!player || !player.isBot) return;

    setBotThinking(true);
    botTimeoutRef.current = setTimeout(() => {
      const hand = hands[currentIndex];
      const move = chooseBotMove(board, hand);

      if (move) {
        const { hand: newHand } = removeCard(hand, move);
        const newBoard = applyMove(board, move);
        const newHands = [...hands];
        newHands[currentIndex] = newHand;
        setBoard(newBoard);
        setHands(newHands);
        setLastAction({ type: "play", playerIndex: currentIndex, card: move });
        Sound.place();
        setBotThinking(false);
        if (!checkRoundEnd(newHands)) setCurrentIndex(advanceTurn(currentIndex));
        return;
      }

      // no legal move: draw once
      if (drawPile.length === 0) {
        setLastAction({ type: "pass", playerIndex: currentIndex });
        setBotThinking(false);
        setCurrentIndex(advanceTurn(currentIndex));
        return;
      }
      const newPile = [...drawPile];
      const drawn = newPile.pop();
      setDrawPile(newPile);
      Sound.draw();

      // if the drawn card happens to be playable, play it immediately after a beat
      if (isValidMove(board, drawn)) {
        const newHands = [...hands];
        newHands[currentIndex] = [...hand, drawn];
        setHands(newHands);
        setLastAction({ type: "draw", playerIndex: currentIndex, card: drawn });
        botTimeoutRef.current = setTimeout(() => {
          const { hand: afterHand } = removeCard(newHands[currentIndex], drawn);
          const newBoard = applyMove(board, drawn);
          const finalHands = [...newHands];
          finalHands[currentIndex] = afterHand;
          setBoard(newBoard);
          setHands(finalHands);
          setLastAction({ type: "play", playerIndex: currentIndex, card: drawn });
          Sound.place();
          setBotThinking(false);
          if (!checkRoundEnd(finalHands)) setCurrentIndex(advanceTurn(currentIndex));
        }, 700);
      } else {
        const newHands = [...hands];
        newHands[currentIndex] = [...hand, drawn];
        setHands(newHands);
        setLastAction({ type: "draw", playerIndex: currentIndex, card: drawn });
        setBotThinking(false);
        setCurrentIndex(advanceTurn(currentIndex));
      }
    }, 850);

    return () => clearTimeout(botTimeoutRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [currentIndex, screen]);

  // ---- turn-change SFX ----
  useEffect(() => {
    if (screen !== "playing") return;
    const myTurnNow = currentIndex === 0;
    if (myTurnNow && prevTurnRef.current !== true) Sound.yourTurn();
    prevTurnRef.current = myTurnNow;
  }, [currentIndex, screen]);

  useEffect(() => {
    if (screen === "roundOver") Sound.victory();
  }, [screen]);

  // ---------------- SETUP SCREEN ----------------
  if (screen === "setup") {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-6 px-4">
        <div className="marquee px-8 py-4 text-center">
          <h1 className="font-display text-2xl md:text-3xl" style={{ color: "var(--brass)" }}>ELFER RAUS!</h1>
          <p className="text-xs opacity-70 mt-1">solo vs computer</p>
        </div>
        <div className="w-full max-w-xs flex flex-col gap-4">
          <div>
            <p className="text-xs opacity-60 mb-2">Number of CPU opponents</p>
            <div className="flex gap-2">
              {[1, 2, 3].map((n) => (
                <button key={n} className={`opt-btn flex-1 ${opponentCount === n ? "active" : ""}`} onClick={() => setOpponentCount(n)}>{n}</button>
              ))}
            </div>
          </div>
          <button className="btn" onClick={startGame}>Start Game</button>
        </div>
      </div>
    );
  }

  // ---------------- ROUND OVER ----------------
  if (screen === "roundOver") {
    const winner = players[winnerIndex];
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-6 px-4">
        <div className="marquee px-8 py-4 text-center">
          <p className="text-xs opacity-70">round over</p>
          <h1 className="font-display text-xl" style={{ color: "var(--brass)" }}>
            {winnerIndex === 0 ? "You win!" : `${winner?.name} wins!`}
          </h1>
        </div>
        <div className="w-full max-w-xs">
          <p className="text-xs opacity-60 mb-2">Penalty points (lower is better)</p>
          <ul className="flex flex-col gap-2">
            {players.map((p, i) => (
              <li key={i} className="board-row" style={{ minHeight: "auto", flexDirection: "row", alignItems: "center", justifyContent: "space-between" }}>
                <span>{i === 0 ? "You" : p.name}</span>
                <span className="font-num">{scores[i] ?? "—"}</span>
              </li>
            ))}
          </ul>
        </div>
        <button className="btn" onClick={playAgain}>Play Again</button>
      </div>
    );
  }

  // ---------------- ACTIVE GAME ----------------
  const currentPlayer = players[currentIndex];
  const myHand = hands[0] || [];

  return (
    <div className="h-screen flex flex-col">
      <div className={`flex items-center justify-between px-3 py-2 marquee mx-2 mt-2 rounded ${isMyTurn ? "turn-pulse" : ""}`}>
        <span className="font-display text-xs" style={{ color: "var(--brass)" }}>SOLO</span>
        <span className="text-sm">
          {isMyTurn ? <b style={{ color: "var(--brass)" }}>Your turn</b> : (
            <span>{currentPlayer?.name}'s turn{botThinking && <span className="thinking-dots ml-1"><span>.</span><span>.</span><span>.</span></span>}</span>
          )}
        </span>
        <span className="text-xs opacity-60 font-num">Draw pile: {drawPile.length}</span>
      </div>

      {errorMsg && (
        <div className="mx-2 mt-2 text-xs px-3 py-1.5 rounded text-center" style={{ background: "var(--red)", color: "#3a0006" }}>{errorMsg}</div>
      )}

      <div className="row-tabs mt-2">
        {COLORS.map((c, i) => (
          <div key={c} className={`row-dot ${i === activeTabIndex ? "active" : ""}`} style={i === activeTabIndex ? { background: `var(--${c})` } : {}} onClick={() => setActiveTabIndex(i)} />
        ))}
      </div>
      <div className="board-wrap flex-1 min-h-0">
        {COLORS.map((color) => (
          <BoardRow
            key={color}
            color={color}
            row={board[color]}
            dragOver={dragOverColor === color}
            onDragOver={() => setDragOverColor(color)}
            onDragLeave={() => setDragOverColor(null)}
            onDrop={handleDrop(color)}
            onRowTap={() => handleRowTap(color)}
          />
        ))}
      </div>

      <div className="flex gap-2 px-3 overflow-x-auto text-[11px] opacity-70 pb-1">
        {players.map((p, i) => (
          <span key={i} className={i === currentIndex ? "font-bold" : ""} style={i === currentIndex ? { color: "var(--brass)" } : {}}>
            {i === 0 ? "You" : p.name} ({(hands[i] || []).length})
          </span>
        ))}
      </div>

      <div className="flex gap-2 justify-center px-3 pb-2">
        <button className="btn btn-ghost text-xs" disabled={!isMyTurn || humanCanPlayAnything} onClick={handleDraw}>Draw Card</button>
        <button className="btn btn-ghost text-xs" disabled={!isMyTurn} onClick={handleEndTurn}>End Turn / Pass</button>
      </div>

      <div className="hand-strip border-t" style={{ borderColor: "var(--felt-line)" }}>
        {myHand.map((card, i) => {
          const playable = isValidMove(board, card);
          const isSelected = selectedCard && selectedCard.color === card.color && selectedCard.value === card.value;
          return (
            <div key={`${card.color}-${card.value}-${i}`} draggable={isMyTurn} onDragStart={(e) => e.dataTransfer.setData("text/plain", JSON.stringify(card))}>
              <Card card={card} selected={isSelected} playable={isMyTurn && playable} onClick={() => handleCardTap(card)} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
